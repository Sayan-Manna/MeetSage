spring:
  application:
    name: meetsage

  datasource:
    url: jdbc:postgresql://localhost:5433/meetsage
    username: meetsage
    password: meetsage

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  servlet:
    multipart:
      enabled: true
      max-file-size: 500MB
      max-request-size: 500MB

  flyway:
    enabled: true
    locations: classpath:db/migrations
#    As we already have an initial schema, we can set baseline-on-migrate to true and baseline-version to 1 to avoid errors on the first migration
    baseline-on-migrate: true
    baseline-version: 1

  ai:
    google:
      genai:
        api-key: ${GEMINI_API_KEY}
        chat:
          options:
            model: gemini-3-flash-preview
            temperature: 0.7
        embedding:
          enabled: true
          api-key: ${GEMINI_API_KEY}
          options:
            model: gemini-embedding-2-preview
            dimensions: 3072
    vectorstore:
      pgvector:
        index-type: none
        distance-type: cosine_distance
        dimensions: 3072
        initialize-schema: true

meetsage:
  storage:
    upload-dir: ${UPLOAD_DIR:./uploads}
  analysis:
    chunk-size: 1000
    chunk-overlap: 150
    rag-top-k: 5
    rag-similarity-threshold: 0.5



server:
  port: 8080
